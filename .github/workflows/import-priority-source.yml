name: Import Priority App source

on:
  push:
    branches: [main]
    paths:
      - ".source-parts/**"
      - ".github/workflows/import-priority-source.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: priority-source-import
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the private repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and verify the source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .source-parts/part-* > /tmp/PriorityTasks-source.zip
          echo "e8f8e6582252f362d20415260934a3be244106c443ca43c47cb8938754a791f2  /tmp/PriorityTasks-source.zip" | sha256sum -c -
          mkdir -p /tmp/priority-source
          unzip -q /tmp/PriorityTasks-source.zip -d /tmp/priority-source
          test -f /tmp/priority-source/PriorityTasks2-Automation/AGENTS.md
          test -f /tmp/priority-source/PriorityTasks2-Automation/FEATURE-LEDGER.md
          test -f /tmp/priority-source/PriorityTasks2-Automation/package-lock.json
          cp -a /tmp/priority-source/PriorityTasks2-Automation/. .

      - name: Run regression checks
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          npm test

      - name: Commit the imported source
        shell: bash
        run: |
          set -euo pipefail
          git rm -r .source-parts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Import verified Priority App v2.1 source"
          git push
